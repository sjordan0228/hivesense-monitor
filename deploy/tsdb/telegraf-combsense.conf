[[inputs.mqtt_consumer]]
  servers = ["tcp://192.168.1.82:1883"]
  topics = ["combsense/hive/+/reading"]
  qos = 0
  connection_timeout = "30s"
  client_id = "telegraf-combsense-tsdb"
  username = "hivesense"
  password = "hivesense"

  data_format = "json_v2"

  [[inputs.mqtt_consumer.json_v2]]
    measurement_name = "sensor_reading"

    [[inputs.mqtt_consumer.json_v2.tag]]
      path = "id"
      rename = "sensor_id"

    [[inputs.mqtt_consumer.json_v2.field]]
      path = "t1"
      type = "float"
      optional = true
    [[inputs.mqtt_consumer.json_v2.field]]
      path = "t2"
      type = "float"
      optional = true
    [[inputs.mqtt_consumer.json_v2.field]]
      path = "b"
      type = "int"
      optional = true
    [[inputs.mqtt_consumer.json_v2.field]]
      path = "t"
      rename = "sensor_ts"
      type = "int"
      optional = true
    [[inputs.mqtt_consumer.json_v2.field]]
      path = "v"
      rename = "fw_version"
      type = "string"
      optional = true
    [[inputs.mqtt_consumer.json_v2.field]]
      path = "vbat_mV"
      type = "int"
      optional = true
    [[inputs.mqtt_consumer.json_v2.field]]
      path = "rssi"
      type = "int"
      optional = true

[[outputs.influxdb_v2]]
  urls = ["http://127.0.0.1:8086"]
  token = "<REDACTED — retrieve from /root/.combsense-tsdb-creds on LXC 124>"
  organization = "combsense"
  bucket = "combsense"
