[platformio]
default_envs = xiao-c6-sht31

[env:esp32-base]
platform = https://github.com/pioarduino/platform-espressif32/releases/download/53.03.10/platform-espressif32.zip
framework = arduino
board_build.partitions = partitions_tag.csv
monitor_speed = 115200
lib_ldf_mode = chain+
build_flags =
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DARDUINO_USB_MODE=1

[env:xiao-c6-sht31]
extends = env:esp32-base
board = esp32-c6-devkitm-1
extra_scripts = pre:get_version.py
lib_deps =
    adafruit/Adafruit SHT31 Library@^2.2.2
    knolleary/PubSubClient@^2.8
    bblanchon/ArduinoJson@^7.1.0
    Networking
build_flags =
    ${env:esp32-base.build_flags}
    -I../shared
    -DCORE_DEBUG_LEVEL=3
    -DSENSOR_SHT31
    -DOTA_VARIANT=\"sht31\"
build_src_filter =
    +<*>
    -<sensor_ds18b20.cpp>

[env:xiao-c6-ds18b20]
extends = env:esp32-base
board = esp32-c6-devkitm-1
extra_scripts = pre:get_version.py
lib_deps =
    pstolarz/OneWireNg@^0.14.1
    milesburton/DallasTemperature@^3.11.0
    knolleary/PubSubClient@^2.8
    bblanchon/ArduinoJson@^7.1.0
    Networking
lib_ignore = OneWire
build_flags =
    ${env:esp32-base.build_flags}
    -I../shared
    -DCORE_DEBUG_LEVEL=3
    -DSENSOR_DS18B20
    -DOTA_VARIANT=\"ds18b20\"
build_src_filter =
    +<*>
    -<sensor_sht31.cpp>

[env:waveshare-s3zero-ds18b20]
# NOT RECOMMENDED for solar/deep-sleep deployment. The S3-Zero's stock AMS1117-3.3
# LDO needs >4.3V on VIN to regulate, so a single 18650 (3.0-4.2V) cannot power it
# directly. Workarounds (MH-CD42 charge+boost module) hit deep-sleep auto-load
# cutoff at <45 mA / 32 s and brick the device on every cycle. Use the C6
# `ds18b20` env unless you've replaced the S3-Zero LDO with an XC6206/HT7333.
extends = env:esp32-base
# waveshare_esp32_s3_zero is not in the pioarduino board index; use the generic
# S3 devkit and constrain flash to 4 MB to match the S3-MINI-1 module.
board = esp32-s3-devkitc-1
board_build.flash_size = 4MB
board_upload.flash_size = 4MB
board_build.flash_mode = qio
board_build.f_flash = 80000000L
extra_scripts = pre:get_version.py
lib_deps =
    pstolarz/OneWireNg@^0.14.1
    milesburton/DallasTemperature@^3.11.0
    knolleary/PubSubClient@^2.8
    bblanchon/ArduinoJson@^7.1.0
    Networking
lib_ignore = OneWire
build_flags =
    ${env:esp32-base.build_flags}
    -I../shared
    -DCORE_DEBUG_LEVEL=3
    -DSENSOR_DS18B20
    -DOTA_VARIANT=\"s3-ds18b20\"
    -DPIN_ONE_WIRE_GPIO=4
    -DPIN_BATTERY_ADC_GPIO=1
build_src_filter =
    +<*>
    -<sensor_sht31.cpp>

[env:xiao-c6-ds18b20-scale]
extends = env:xiao-c6-ds18b20
lib_deps =
    ${env:xiao-c6-ds18b20.lib_deps}
    bogde/HX711@^0.7.5
build_flags =
    ${env:xiao-c6-ds18b20.build_flags}
    -DSENSOR_SCALE
    -DPIN_HX711_DT=16
    -DPIN_HX711_SCK=17
    -DOTA_VARIANT=\"ds18b20-scale\"

[env:native]
platform = native
test_framework = unity
test_build_src = true
lib_deps =
    bblanchon/ArduinoJson@^7.1.0
build_flags =
    -std=gnu++17
    -Iinclude
    -Isrc
    -DUNITY_INCLUDE_DOUBLE
build_src_filter =
    +<payload.cpp>
    +<ota_manifest.cpp>
    +<ota_decision.cpp>
    +<ota_sha256.cpp>
    +<config_parser.cpp>
    +<scale_math.cpp>
