name: PlatformIO Build

on:
  push:
    paths:
      - 'firmware/**'
      - '.github/workflows/build.yml'
  pull_request:
    paths:
      - 'firmware/**'

jobs:
  build-hive-node:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cache/pip
            ~/.platformio
          key: pio-hive-${{ hashFiles('firmware/hive-node/platformio.ini') }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install PlatformIO
        run: pip install platformio

      - name: Build hive-node firmware
        run: cd firmware/hive-node && pio run

  build-collector:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cache/pip
            ~/.platformio
          key: pio-collector-${{ hashFiles('firmware/collector/platformio.ini') }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install PlatformIO
        run: pip install platformio

      - name: Build collector firmware
        run: cd firmware/collector && pio run
